name: CI

on:
  workflow_dispatch:
    inputs:
      debug-build:
        type: boolean
        description: "Build in debug mode instead of release"

  push:
    branches:
      - main
      - dev
    paths-ignore:
      - ".github/workflows/release.yaml"
      - ".github/ISSUE_TEMPLATE/**"
      - "patches-contrib/**"
      - "LICENSE"
      - "**/*.md"
      - "README.md"

  pull_request:
    paths-ignore:
      - ".github/workflows/release.yaml"
      - "patches-contrib/**"
      - "LICENSE"
      - "**/*.md"
      - "README.md"

env:
  progname: "magiskboot"

permissions:
  contents: read

jobs:
  # ── Variables ────────────────────────────────────────────────────────
  vars:
    name: Prepare (variables)
    runs-on: ubuntu-latest
    permissions:
      contents: none
    outputs:
      short_sha: ${{ steps.get_short_sha.outputs.SHORT_SHA }}
      cmake_build_type: ${{ steps.detect_build_type.outputs.CMAKE_BUILD_TYPE }}
      build_type: ${{ steps.detect_build_type.outputs.BUILD_TYPE }}

    steps:
      - name: Determine short Git commit SHA
        id: get_short_sha
        run: |
          echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c 1-7`" | tee -a $GITHUB_OUTPUT

      - name: Detect build types
        id: detect_build_type
        run: |
          CMAKE_BUILD_TYPE=Release
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.debug-build }}" == "true" ]]; then
              CMAKE_BUILD_TYPE=Debug
            fi
          fi
          echo "CMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE}" | tee -a $GITHUB_OUTPUT
          echo "BUILD_TYPE=${CMAKE_BUILD_TYPE,,}" | tee -a $GITHUB_OUTPUT

  # ── Source package ──────────────────────────────────────────────────
  src:
    name: Prepare (source)
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends --no-install-suggests patch cmake ninja-build

      - name: Prepare (Git)
        run: |
          git config --global user.email "user@example.com"
          git config --global user.name "Example user"

      - name: Prepare (checkout)
        uses: actions/checkout@v4

      - name: Prepare (submodule)
        run: |
          ./scripts/clone_submodules.sh

          for _repo in $(git submodule foreach --recursive --quiet 'env'); do
            git config --global --add safe.directory "$_repo"
          done
          unset _repo

      - name: Package source
        run: |
          CC=true cmake -B build -G Ninja -DCMAKE_C_COMPILER_WORKS=YES -DWITHOUT_BUILD=ON
          cmake --build build -t package_source -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srcpkg
          if-no-files-found: error
          path: ${{ github.workspace }}/build/magiskboot_*-src.tar.xz

  # ── Linux x86_64 ────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Build (Linux x86_64)
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    needs: [vars]

    steps:
      - name: Prepare
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential pkg-config cmake ninja-build \
            liblzma-dev liblz4-dev libbz2-dev zlib1g-dev \
            clang lld libc++-dev libc++abi-dev

      - name: Synchronize (source)
        uses: yogeshlonkar/wait-for-jobs@v0.2.1
        with:
          jobs: 'Prepare (source)'

      - name: Prepare (source)
        uses: actions/download-artifact@v4
        with:
          name: srcpkg

      - name: Build
        run: |
          tar -xf magiskboot_*-src.tar.xz
          cd magiskboot_*-src/

          CC=clang CXX=clang++ cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ needs.vars.outputs.cmake_build_type }} \
            -DPREFER_STATIC_LINKING=ON

          cmake --build build -j "$(nproc)" -v
          strip build/magiskboot

          file build/magiskboot
          ldd build/magiskboot || true
          ./build/magiskboot || true

          mkdir -p "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          cp -av build/magiskboot "$GITHUB_WORKSPACE/${{ env.progname }}-out/"

      - name: Check
        run: |
          cd magiskboot_*-src/
          ./scripts/magiskboot_test.sh "$GITHUB_WORKSPACE/${{ env.progname }}-out/magiskboot"

      - name: Package
        run: |
          cd "${{ env.progname }}-out"
          zip "magiskboot-linux-x86_64.zip" magiskboot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: magiskboot-linux-x86_64
          path: ${{ github.workspace }}/${{ env.progname }}-out/magiskboot-linux-x86_64.zip

      - name: Cancel other jobs
        if: failure()
        uses: andymckay/cancel-action@0.4

  # ── Linux aarch64 (cross-compile on Ubuntu 22.04) ───────────────────
  build-linux-aarch64:
    name: Build (Linux aarch64)
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    needs: [vars]

    env:
      rust_target: "aarch64-unknown-linux-gnu"

    steps:
      - name: Prepare (cross-compilation toolchain and arm64 libraries)
        run: |
          # Add ARM64 architecture
          sudo dpkg --add-architecture arm64

          # Add ARM64 package source (Ubuntu ports repository, DEB822 format)
          SOURCES_FILE=/etc/apt/sources.list.d/arm64-cross.sources
          echo 'Types: deb' | sudo tee "$SOURCES_FILE" > /dev/null
          echo 'URIs: http://ports.ubuntu.com/ubuntu-ports' | sudo tee -a "$SOURCES_FILE" > /dev/null
          echo 'Suites: jammy jammy-updates' | sudo tee -a "$SOURCES_FILE" > /dev/null
          echo 'Components: main restricted universe' | sudo tee -a "$SOURCES_FILE" > /dev/null
          echo 'Architectures: arm64' | sudo tee -a "$SOURCES_FILE" > /dev/null
          echo 'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg' | sudo tee -a "$SOURCES_FILE" > /dev/null
          cat "$SOURCES_FILE"

          sudo apt-get update

          # Install cross-compiler + arm64 dev libraries
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config cmake ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libc6-dev:arm64 linux-libc-dev:arm64 \
            liblzma-dev:arm64 liblz4-dev:arm64 libbz2-dev:arm64 zlib1g-dev:arm64

          # Verify cross-compiler
          aarch64-linux-gnu-gcc --version

      - name: Prepare (Rust)
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add ${{ env.rust_target }}

      - name: Synchronize (source)
        uses: yogeshlonkar/wait-for-jobs@v0.2.1
        with:
          jobs: 'Prepare (source)'

      - name: Prepare (source)
        uses: actions/download-artifact@v4
        with:
          name: srcpkg

      - name: Build
        run: |
          . "$HOME/.cargo/env"
          tar -xf magiskboot_*-src.tar.xz
          cd magiskboot_*-src/

          # Create CMake cross-compilation toolchain file
          TOOLCHAIN="$GITHUB_WORKSPACE/aarch64-linux-gnu.toolchain.cmake"
          echo 'set(CMAKE_SYSTEM_NAME Linux)' > "$TOOLCHAIN"
          echo 'set(CMAKE_SYSTEM_PROCESSOR aarch64)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_AR aarch64-linux-gnu-ar)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_RANLIB aarch64-linux-gnu-ranlib)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_STRIP aarch64-linux-gnu-strip)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)' >> "$TOOLCHAIN"
          echo 'set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)' >> "$TOOLCHAIN"
          cat "$TOOLCHAIN"

          # Point pkg-config to arm64 libraries
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig

          # Tell Rust/Cargo which linker to use for aarch64
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc

          cmake -G Ninja -B build \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/aarch64-linux-gnu.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=${{ needs.vars.outputs.cmake_build_type }} \
            -DPREFER_STATIC_LINKING=ON \
            -DWITH_LIBCXX=OFF \
            -DRust_CARGO_TARGET=${{ env.rust_target }}

          cmake --build build -j "$(nproc)" -v

          # Strip with the cross-toolchain strip
          aarch64-linux-gnu-strip build/magiskboot
          file build/magiskboot

          mkdir -p "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          cp -av build/magiskboot "$GITHUB_WORKSPACE/${{ env.progname }}-out/"

      # Cannot run aarch64 test suite on x86_64 host

      - name: Package
        run: |
          cd "${{ env.progname }}-out"
          zip "magiskboot-linux-aarch64.zip" magiskboot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: magiskboot-linux-aarch64
          path: ${{ github.workspace }}/${{ env.progname }}-out/magiskboot-linux-aarch64.zip

      - name: Cancel other jobs
        if: failure()
        uses: andymckay/cancel-action@0.4

  # ── macOS arm64 (native on macos-14) ────────────────────────────────
  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-14
    permissions:
      actions: write
    needs: [vars]
    env:
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

    steps:
      - name: Prepare
        run: |
          brew update
          brew install --overwrite coreutils wget file xz lz4 pkg-config cmake ninja llvm rust || true
          brew install --overwrite coreutils wget file xz lz4 pkg-config cmake ninja llvm rust
          echo "$(brew --prefix)/opt/llvm/bin" | tee -a $GITHUB_PATH

      - name: Synchronize (source)
        uses: yogeshlonkar/wait-for-jobs@v0.2.1
        with:
          jobs: 'Prepare (source)'

      - name: Prepare (source)
        uses: actions/download-artifact@v4
        with:
          name: srcpkg

      - name: Build
        run: |
          tar -xf magiskboot_*-src.tar.xz
          cd magiskboot_*-src/

          CC=clang CXX=clang++ cmake -G Ninja -B build \
            -DCMAKE_AR=llvm-ar -DCMAKE_RANLIB=llvm-ranlib \
            -DCMAKE_BUILD_TYPE=${{ needs.vars.outputs.cmake_build_type }} \
            -DPREFER_STATIC_LINKING=ON

          cmake --build build -j "$(nproc)" -v
          strip build/magiskboot

          file build/magiskboot
          otool -L build/magiskboot
          ./build/magiskboot || true

          rm -rf "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          mkdir -p "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          cp -av build/magiskboot "$GITHUB_WORKSPACE/${{ env.progname }}-out/"

      - name: Check
        run: |
          cd magiskboot_*-src/
          ./scripts/magiskboot_test.sh "$GITHUB_WORKSPACE/${{ env.progname }}-out/magiskboot"

      - name: Package
        run: |
          cd "${{ env.progname }}-out"
          zip "magiskboot-macos-arm64.zip" magiskboot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: magiskboot-macos-arm64
          path: ${{ github.workspace }}/${{ env.progname }}-out/magiskboot-macos-arm64.zip

      - name: Cancel other jobs
        if: failure()
        uses: andymckay/cancel-action@0.4

  # ── macOS x86_64 (native on macos-13) ───────────────────────────────
  build-macos-x86_64:
    name: Build (macOS x86_64)
    runs-on: macos-13
    permissions:
      actions: write
    needs: [vars]
    env:
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

    steps:
      - name: Prepare
        run: |
          brew update
          brew install --overwrite coreutils wget file xz lz4 pkg-config cmake ninja llvm rust || true
          brew install --overwrite coreutils wget file xz lz4 pkg-config cmake ninja llvm rust
          echo "$(brew --prefix)/opt/llvm/bin" | tee -a $GITHUB_PATH

      - name: Synchronize (source)
        uses: yogeshlonkar/wait-for-jobs@v0.2.1
        with:
          jobs: 'Prepare (source)'

      - name: Prepare (source)
        uses: actions/download-artifact@v4
        with:
          name: srcpkg

      - name: Build
        run: |
          tar -xf magiskboot_*-src.tar.xz
          cd magiskboot_*-src/

          CC=clang CXX=clang++ cmake -G Ninja -B build \
            -DCMAKE_AR=llvm-ar -DCMAKE_RANLIB=llvm-ranlib \
            -DCMAKE_BUILD_TYPE=${{ needs.vars.outputs.cmake_build_type }} \
            -DPREFER_STATIC_LINKING=ON

          cmake --build build -j "$(nproc)" -v
          strip build/magiskboot

          file build/magiskboot
          otool -L build/magiskboot
          ./build/magiskboot || true

          rm -rf "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          mkdir -p "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          cp -av build/magiskboot "$GITHUB_WORKSPACE/${{ env.progname }}-out/"

      - name: Check
        run: |
          cd magiskboot_*-src/
          ./scripts/magiskboot_test.sh "$GITHUB_WORKSPACE/${{ env.progname }}-out/magiskboot"

      - name: Package
        run: |
          cd "${{ env.progname }}-out"
          zip "magiskboot-macos-x86_64.zip" magiskboot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: magiskboot-macos-x86_64
          path: ${{ github.workspace }}/${{ env.progname }}-out/magiskboot-macos-x86_64.zip

      - name: Cancel other jobs
        if: failure()
        uses: andymckay/cancel-action@0.4

  # ── Windows x86_64 ─────────────────────────────────────────────────
  build-windows-x86_64:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    permissions:
      actions: write
    needs: [vars]
    env:
      MSYS: "winsymlinks:native"
      msystem: CLANG64

    steps:
      - name: Prepare
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ env.msystem }}
          update: true
          install: >-
            base-devel file wget vim
          pacboy: >-
            xz:p lz4:p bzip2:p zlib:p pkgconf:p clang:p
            lld:p cmake:p libc++:p ninja:p rust:p

      - name: Synchronize (source)
        uses: yogeshlonkar/wait-for-jobs@v0.2.1
        with:
          jobs: 'Prepare (source)'

      - name: Prepare (source)
        uses: actions/download-artifact@v4
        with:
          name: srcpkg

      - name: Build
        shell: msys2 {0}
        run: |
          tar -xf magiskboot_*-src.tar.xz
          cd magiskboot_*-src/

          CC=clang CXX=clang++ cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ needs.vars.outputs.cmake_build_type }} \
            -DPREFER_STATIC_LINKING=ON

          cmake --build build -j "$(nproc)" -v
          strip build/magiskboot.exe

          file build/magiskboot.exe
          ldd build/magiskboot.exe
          ./build/magiskboot.exe || true

          rm -rf "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          mkdir -p "$GITHUB_WORKSPACE/${{ env.progname }}-out"
          cp -av build/magiskboot.exe "$GITHUB_WORKSPACE/${{ env.progname }}-out/"

      - name: Check
        shell: msys2 {0}
        run: |
          cd magiskboot_*-src/
          ./scripts/magiskboot_test.sh "$GITHUB_WORKSPACE/${{ env.progname }}-out/magiskboot.exe"

      - name: Package
        shell: msys2 {0}
        run: |
          cd "${{ env.progname }}-out"
          zip "magiskboot-windows-x86_64.zip" magiskboot.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: magiskboot-windows-x86_64
          path: ${{ github.workspace }}/${{ env.progname }}-out/magiskboot-windows-x86_64.zip

      - name: Cancel other jobs
        if: failure()
        uses: andymckay/cancel-action@0.4
